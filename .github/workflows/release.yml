on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun build --compile ./src/main.ts --outfile img2key
        shell: bash
      - name: Package binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a img2key-windows.zip img2key.exe
          else
            chmod +x img2key
            tar czf img2key-${{ runner.os }}.tar.gz img2key
          fi      - uses: softprops/action-gh-release@v2
        with:
          files: |
            img2key-*.tar.gz
            img2key-windows.zip
